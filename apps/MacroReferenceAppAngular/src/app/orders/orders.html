<!-- 1) Order Blotter (master/detail) -->
<section class="macro-panel macro-panel-orders">
  <header class="macro-panel-header">Order Blotter</header>
  <div class="macro-panel-body">
    <app-macro-grid
      [rowData]="orders"
      [getRowId]="getRowId"
      [gridOptions]="orderGridOptions"
      title="Order Blotter"
    ></app-macro-grid>
  </div>
</section>

<!-- 2) Trade Blotter (flat) -->
<section class="macro-panel macro-panel-trades">
  <header class="macro-panel-header">Trade Blotter</header>
  <div class="macro-panel-body">
    <app-macro-grid
      [rowData]="trades"
      [columnDefs]="tradeColumns"
      [getRowId]="getTradeRowId"
      title="Trade Blotter"
    ></app-macro-grid>
  </div>
</section>
